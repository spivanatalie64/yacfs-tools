name: Mirror (UltraCompressed)

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Create ultra-compressed Codeberg mirror
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          # Use the central shrinker from .github repo
          curl -sL https://raw.githubusercontent.com/spivanatalie64/.github/main/codeberg-shrink.sh | sh -s -- yacfs-tools spivanatalie64 $CODEBERG_TOKEN
          # Push to Codeberg
          cd /tmp/codeberg-mirror
          git remote add codeberg https://sprunglesontheberg:${CODEBERG_TOKEN}@codeberg.org/sprunglesontheberg/yacfs-tools.git
          git push codeberg main --force
